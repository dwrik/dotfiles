theme = "bad-wolf"
icons = "awesome5"

[[block]]
block = "focused_window"
max_width = 50
show_marks = "visible"

[[block]]
block = "backlight"

[[block]]
block = "sound"
driver = "alsa"

[[block]]
block = "music"
player = "spotify"
on_collapsed_click = "spotify"
buttons = ["prev", "play", "next"]
# on_click = "spotify"

[[block]]
block = "temperature"
collapsed = false
interval = 20
format = "{min}° min, {max}° max, {average}° avg"
chip = "*-isa-*"

[[block]]
block = "battery"
interval = 60
format = "{percentage}% {time}"

[[block]]
block = "networkmanager"
on_click = "alacritty -e nmtui"
device_format="{icon}{ap}"

[[block]]
block = "disk_space"
path = "/"
alias = "/"
info_type = "available"
unit = "GB"
interval = 20
warning = 20.0
alert = 10.0

[[block]]
block = "memory"
display_type = "memory"
format_mem = "{Mup}%"
format_swap = "{SUp}%"

[[block]]
block = "cpu"
interval = 1

[[block]]
block = "load"
interval = 1
format = "{1m}"

[[block]]
block = "time"
interval = 60
format = "%a %d/%m %I:%M %p"
